<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--1. DATA List Tag - As per the data, you will get a list of options.-->
    <label>Food</label>
    <input list = "food">
    <datalist id = "food">
        <option value = "pizza">
        <option value = "burger">
        <option value = "beverage">
        <option value = "coke">
        <option value = "beverage">
    </datalist>
    <label>Location</label>
    <input list = "location">
    <datalist id = "location">
        <option value = "mumbai">
        <option value = "bangalore">
        <option value = "chennai">
        <option value = "delhi">
        <option value = "hyderabad">
    </datalist>
</body>
</html>
