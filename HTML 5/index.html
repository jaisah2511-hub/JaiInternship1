<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--header section, main section, footer section-->
    <!--semantic tags - used to make your code more readable and SEO friendly-->
    <!--Video - mp4 format, audio - mp3, controls to play the video, autoplay on playing the video automatically-->
    <!--autoplay loop - to play video continously in a loop-->
    <!--you can use controls to give controls or vice-versa-->
    <video controls autoplay loop height = 600 width = 600>
        <source src = "https://www.pexels.com/download/video/34202847/" type = "video/mp4">
    </video>
    <!--Until you don't write controls you will not get the controls or music in your screen-->
    <!--Multimedia - Autoplay, loop in audio-->
    <audio controls>
        <source src = "./fassounds-escape-your-love-upbeat-fashion-pop-dance-412230.mp3" type = "audio/mp3">
    </audio>
    <a href = "adavancedhtml5.html">AdvancedHTML5</a>
    <a href = "semantictags.html">Semantic Tags</a>
</body>
</html>
