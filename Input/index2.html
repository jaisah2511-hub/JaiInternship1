<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var abc = confirm("Are you sure?"); //confirm is used to get confirmation from user. It will show a dialog box with OK and Cancel buttons. It will return true if user clicks on OK button. It will return false if user clicks on Cancel button.
        if(abc == true) { //if user clicks on OK button, then abc will be true. If user clicks on Cancel button, then abc will be false.
            console.log("You are sure!"); //console.log is used to print output to console. It will print the value of abc variable. It will print the value of abc variable
        } else {
            console.log("You are not sure!"); //console.log is used to print output to console. It will print the value of abc variable. It will print the value of abc variable
        } //if(abc).
    </script>
</body>
</html>
