<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //1. Template String - Variable or paramter along with text.
        var a = "John"
        //Oldway
        console.log("My name is " , a)
        //NewWay - ${variablename/Parameter}
        console.log(`My name is ${a}`) //always use backticks, here.
        //2.Arrow Function - Function Logic in One Line
        //oldway - function
        function xyz() {
            console.log("Hello I am Old Function")
        }
        xyz() //basic rule - write a function, then we need to call the function.
        //newway
        var abc = ()=>{
            console.log("Hello I am Arrow Function")
        }
        abc()
        //api (helper/waiter in restaurant) - carries data/information - data from api - waiter carries data and serves it at right place.
        //waiter - talks in code word - table number (example)
        //FETCH("api address") - to get/collect the data - convert to json (javascript - object - notation) format.
        //Object (Key Value Pairs - "key" - key also in double quotes - json format data:value - json is a human readable format) ---
    </script>
</body>
</html>
