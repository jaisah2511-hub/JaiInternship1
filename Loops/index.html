    <script>
        // Loops in JavaScript
        // 1. For Loop
        //Print Numbers from 1 to 10; console.log(1,2,3,----10);
        for (let i = 1; i <= 10; i++) {
            console.log("The Value is: ", i);
        }
        //Print Numbers from 10 to 1; console.log(1,2,3,----10);
        for (let i = 10; i >= 1; i--) {
            console.log("The Value is: ", i);
        }
        //For Loop - It has 3 parts - 1. Initialization, 2. Condition, 3. Increment/Decrement
//body of for loop is executed until the condition is true. Once the condition becomes false, the loop stops executing.
        // 2. While Loop
        //condition is checked first, if it is true, then the body of the loop is executed. Once the condition becomes false, the loop stops executing.
        let count = 1;
        while (count <= 5) { //1<=5, 2<=5, 3<=5, 4<=5, 5<=5, 6<=5 (false) - loop stops executing.
            console.log("Hello from While Loop: ", count);
            count++;
        }
        //condition is must to stop the loop, otherwise it will keep executing infinitely. It is called Infinite Loop.
        /*avoid infinite loop - while(true) {console.log("Hello");} - it will keep printing "Hello" infinitely. */

        // 3. Do-While Loop - Exit Control Loop
        //body of the loop is executed first, then the condition is checked. If the condition
        //it will run/execute the body of the loop at least once, even if the condition is false.
        let k = 7;
        do {
            console.log("Hi I am Do-While Loop: ", k);
            //k++; //HI I aam Do-While Loop: Output.
        } while (k < 5);

        let fruits = ["Apple", "Banana", "Mango", "Orange", "Grapes", 123, true, null, undefined, NaN, Infinity, -Infinity, { name: "Ayush", age: 20 }, [1, 2, 3], function () { console.log("Hello from Function"); }];

        fruits.push("Pineapple"); //add the data at the end of the array.
        console.log(fruits);
        fruits.unshift("Strawberry"); //add the data at the beginning of the array.
        console.log(fruits);
        //Remove the Data
