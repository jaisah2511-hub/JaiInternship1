<body>

    <script>
        // "Text" or 'Text' in js.
        console.log("Hello from Body Section!");
        var username = "Ayush";
        console.log(username);
        var age = 20;
        var age = 36;
        console.log(age);
        let email = "ayush@example.com";
        console.log(email);
       // let password = 1234;
        console.log(password);
        let name = "Ayush";
        name = "Bob";
        console.log(name);
        const appName = "Netflix";
        console.log(appName);
        var city = "New York";
        console.log(city);
        console.log("the city name is ", city);
        console.log(typeof city);
        console.log(typeof(city));
        var password = 1234;
        console.log(typeof password);
        //2. Number
        var age = 32;
        //Undefined - value is not assigned -more data types
        var x;
        console.log(typeof x); //undefined
        var discount = null; //none data type (very important interview question)/
        console.log(typeof discount); //object (but we should get null).
        //there is bug in Js.
        //Operators
        //Arithmetic Operators -  - +, /, *, %, ++, --
        var x = 10;
        var y = 5;
        console.log(x + y);
        console.log(x - y);
        console.log(x * y);
        console.log(x / y);
        console.log(x % y);
        //Assignment Operators - =, +=, -=, *=, /=, %=, value to be assigned
        var a = 10;
        console.log(a);
        a += 5; //a = a + 5;
        //Comparison Operators - ==, ===, !=, !==, >, <, >=, <=
        //output - boolean type - true or false
        var p = 20;
        var q = 15;
        console.log(p == q); //false
        console.log(p === q); //false
        console.log(p != q); //true
        console.log(p !== q); //true
        console.log(p > q); //true
        console.log(p < q); //false
        console.log(p >= q); //true
        console.log(p <= q); //false
        var b = 25;
        var c = 25;
        console.log(b >= c); //true
        console.log(b <= c); //true
        //important
        var d = 25;
        var e = "25";
        console.log(d == e); //true
        //== - checks only value of left and right side. not data type.
        //=== - checks value and data type of left and right side.
        console.log(d === e); //false
        //Logical Operators - &&, ||, ! (and, or, not).
        //and - true if both are true
        //or - true if any one is true
        //not - true if false, false if true (opposite value)
        var isLoggedIn = true;
        var isEmailVerified = false;
        var canWatchVideoes = true;
        console.log(isLoggedIn && isEmailVerified); //false
        var isMember = false;
        var totalAmount = 1500;
        console.log("discount applicable: ", isMember || totalAmount > 1000); //true
        console.log(!isMember); //true
        console.log("Can Watch Videoes: ", isLoggedIn && isEmailVerified && canWatchVideoes); //false
        var FirstTimeUser = true;
        var bill = 500;
        console.log("Discount Applicable: ", FirstTimeUser || bill >= 500); //true
        console.log(isLoggedIn || CanWatchVideoes); //true
        let NetflixSubs = true;
        console.log("The status", NetflixSubs); //true
        console.log("The status", !NetflixSubs); //false
    </script>
